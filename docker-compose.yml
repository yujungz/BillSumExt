version: "3.3"

services:
  mysql:
    image: mysql:8.0
    container_name: BillSumExt-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: Bill1@3
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_0900_ai_ci
    ports:
      - "23307:3306"
    volumes:
      - BillSumExt_mysql_data:/var/lib/mysql
    networks:
      - BillSumExt_net
    restart: unless-stopped

  billsumext-app:
    build:
      context: .
      dockerfile: deploy.Dockerfile
    container_name: BillSumExt-app
    ports:
      - "8090:443"
      - "8091:80"
    volumes:
      - BillSumExt_app_data:/app/data
      - /e/work/(03)burncloud/ssh:/ssh_keys:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - MYSQL_HOST=BillSumExt-mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=Bill1@3
      - MYSQL_CONTAINER=BillSumExt-mysql
      - SSL_DOMAIN=shadow.burncloud.com
    depends_on:
      - mysql
    networks:
      - BillSumExt_net
    restart: unless-stopped

volumes:
  BillSumExt_app_data:
  BillSumExt_mysql_data:

networks:
  BillSumExt_net:
    driver: bridge
